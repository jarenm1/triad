<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#161b22"/>

  <defs>
    <filter id="glow-sub" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Animated Triangle (scaled and positioned) -->
  <g transform="translate(150, 100)">
    <!-- Base triangle -->
    <path
      d="M 0 -50 L 58 42 L -58 42 Z"
      fill="none"
      stroke="#8b949e"
      stroke-width="2.5"
      stroke-linejoin="round"
      filter="url(#glow-sub)"
    >
      <animate
        attributeName="stroke-dasharray"
        values="0 400; 220 180; 360 0; 360 0"
        keyTimes="0;0.35;0.7;1"
        dur="2.4s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="stroke-dashoffset"
        values="0; -60; -120; -120"
        keyTimes="0;0.35;0.7;1"
        dur="2.4s"
        repeatCount="indefinite"
      />
    </path>

    <!-- Sub-triangles -->
    <g stroke="#8b949e" stroke-width="1.8" stroke-linejoin="round" fill="none" filter="url(#glow-sub)">
      <path d="M 0 -50 L 29 -8 L -29 -8 Z" />
      <path d="M 29 -8 L 58 42 L 0 42 Z" />
      <path d="M -29 -8 L 0 42 L -58 42 Z" />
      <path d="M 29 -8 L 0 42 L -29 -8 Z" />

      <animate
        attributeName="opacity"
        values="0;0;1;1"
        keyTimes="0;0.5;0.8;1"
        dur="2.4s"
        repeatCount="indefinite"
      />
    </g>
  </g>

  <!-- Title Text -->
  <text x="260" y="110" font-family="Georgia, 'Times New Roman', serif" font-size="110" font-weight="400" fill="#c9d1d9" text-anchor="start" dominant-baseline="middle">
    Triad
  </text>
</svg>
